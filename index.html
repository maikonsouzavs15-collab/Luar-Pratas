<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luar Pratas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background-color: #000; /* Fundo de segurança preto */
        }

        /* O link da tela toda (com o clique para o catálogo) */
        .link-tela-cheia {
            display: block;
            width: 100%;
            height: 100vh;
            text-decoration: none;
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
            cursor: pointer;
            z-index: 1; /* Fica na camada de trás */
        }

        /* Imagem para PC */
        @media (min-width: 769px) {
            .link-tela-cheia {
                background-image: url('assets/fundopc.png');
            }
        }

        /* Imagem para CELULAR */
        @media (max-width: 768px) {
            .link-tela-cheia {
                background-image: url('assets/fundocelular.png');
            }
        }

        /* Container dos ícones (garante que fiquem visíveis) */
        .icones-sociais {
            position: fixed;
            bottom: 10px; /* Mais perto da borda inferior */
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 15px;
            pointer-events: none; /* Deixa o clique passar para a tela cheia */
            z-index: 10; /* Fica na camada da frente de TUDO */
        }

        .icones-sociais a {
            pointer-events: auto; /* Reativa o clique nos ícones */
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease;
        }

        .icones-sociais a:hover {
            transform: scale(1.1);
        }

        /* Estilo para remover fundo branco forçadamente (tentativa via CSS) */
        .icones-sociais img {
            width: 35px;  /* Diminuí o tamanho (era 50px) */
            height: 35px; /* Diminuí o tamanho (era 50px) */
            object-fit: contain;
            /* Tenta mascarar o fundo branco se a imagem não for transparente */
            background-color: transparent !important; 
        }

        /* Adiciona um fundo escuro sutil atrás do ícone do Instagram para visibilidade */
        .link-instagram {
            border-radius: 8px;
            padding: 3px;
        }
    </style>
</head>
<body>

    <a href="catalog.html" class="link-tela-cheia"></a>

    <div class="icones-sociais">
        <a href="https://wa.me/5585991599704" target="_blank" class="link-whatsapp">
            <img src="assets/whatsapp.png" alt="WhatsApp">
        </a>

        <a href="https://www.instagram.com/luar.prata__?igsh=MXVmNmlsdGpjYmlldA==" target="_blank" class="link-instagram">
            <img src="assets/instagram.png" alt="Instagram">
        </a>
    </div>

</body>
</html>
